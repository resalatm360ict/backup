name: Daily Mongo Backup
on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch: # Allows manual runs

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Install rclone and MongoDB tools
      - name: Install Tools
        run: |
          # Install rclone
          curl https://rclone.org/install.sh | sudo bash
          # Add MongoDB repo key and source
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools

      # Step 2: Configure rclone using the secret
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf

      # Step 3: Run MongoDB backup and upload to Google Drive
      - name: Run Backup
        run: |
          # Create backup filename with date
          FILENAME="backup-$(date +%Y-%m-%d).gz"

          # Dump MongoDB to gzip archive
          mongodump --uri="${{ secrets.MONGO_URI }}" --archive="$FILENAME" --gzip

          # Copy backup to Google Drive remote
          rclone copy "$FILENAME" resalat:MongoDB_Backups


