name: Daily Mongo Backup

on:
  schedule:
    - cron: '0 0 * * *'   # Runs every day at 00:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Install Required Tools
      # -----------------------------
      - name: Install Tools
        run: |
          # Install rclone
          curl https://rclone.org/install.sh | sudo bash

          # Install MongoDB Database Tools
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools zip

      # -----------------------------
      # Configure rclone (Google Drive)
      # -----------------------------
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo '${{ secrets.RCLONE_CONFIG }}' > ~/.config/rclone/rclone.conf

      # -----------------------------
      # MongoDB Backup (Collection Wise)
      # -----------------------------
      - name: Run MongoDB Backup
        run: |
          DATE=$(date +%Y-%m-%d)
          DB_NAME="sample_mflix"
          BACKUP_DIR="mongo-backup-$DATE"

          echo "Creating backup directory..."
          mkdir -p $BACKUP_DIR

          echo "Dumping MongoDB collections..."

          mongodump \
            --uri="${{ secrets.MONGO_URI }}" \
            --db=$DB_NAME \
            --gzip \
            --out=$BACKUP_DIR

          echo "Creating ZIP archive..."
          zip -r backup-$DATE.zip $BACKUP_DIR

          echo "Uploading backup to Google Drive..."
          rclone copy backup-$DATE.zip resalat:MongoDB_Backups --progress

          echo "Cleaning local files..."
          rm -rf $BACKUP_DIR
          rm backup-$DATE.zip

          echo "Backup completed successfully ✅"


