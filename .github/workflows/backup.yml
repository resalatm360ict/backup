name: Daily Mongo Backup
on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch:     # Allows you to click a button to run it manually

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo curl https://rclone.org/install.sh | sudo bash
          wget -qO - https://www.mongodb.org/static/pgp/server-6.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/6.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-6.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools

      - name: Setup Credentials
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Run Backup
        run: |
          FILENAME="backup-$(date +%Y-%m-%d).gz"
          mongodump --uri="${{ secrets.MONGODB_URI }}" --archive="$FILENAME" --gzip
          rclone copy "$FILENAME" gdrive:MongoDB_Backups